name: Build macOS Binary

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "template/**"
      - "requirements.txt"
      - "整合*.py"
      - "开始整合*.sh"
      - "start_*.command"
      - "bank_integration_mac.spec"
      - ".github/workflows/build-mac.yml"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required files
        run: |
          test -f bank_integration_mac.spec
          test -f "template/1/国内银行汇总.xlsx"
          test -f "template/2/银行汇总.xlsx"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build binaries
        run: |
          python -m PyInstaller ./bank_integration_mac.spec --clean --noconfirm
          chmod +x "dist/bank-integration/domestic_bank_integration"
          chmod +x "dist/bank-integration/overseas_bank_integration"
          chmod +x "dist/bank-integration/order_payment_match"
          chmod +x "dist/bank-integration/"*.command

      - name: Package
        run: |
          mkdir -p dist_mac
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "bank-integration" "../dist_mac/bank-integration-mac.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bank-integration-mac
          path: dist_mac/bank-integration-mac.zip
          if-no-files-found: error
